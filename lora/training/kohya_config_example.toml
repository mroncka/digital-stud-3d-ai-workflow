# Flux LoRA Training Config — digital-stud standard
# Tool: Kohya SS / musubi-tuner
# Model: black-forest-labs/FLUX.1-dev
# Use case: character/face identity LoRA
# Updated: 2026-03-11

[general]
enableo_bucket_no_upscale = true
caption_extension = ".txt"
shuffle_caption = true
keep_tokens = 1
max_token_length = 225

[optimizer_arguments]
optimizer_type = "prodigy"
learning_rate = 1.0
d_coef = 0.5
precondition = true
weight_decay = 0.01
betas = [0.9, 0.999]

# Note: Prodigy is self-adjusting (lr=1.0 is just a scale factor)
# Alternative if Prodigy OOM: optimizer_type = "AdamW8bit", learning_rate = 1e-4

[training_arguments]
output_dir = "./output"
output_name = "character_lora_flux"
save_model_as = "safetensors"
pretrained_model_name_or_path = "black-forest-labs/FLUX.1-dev"
mixed_precision = "bf16"
full_bf16 = true
no_half_vae = true

train_batch_size = 1
gradient_accumulation_steps = 4
gradient_checkpointing = true

max_train_steps = 3000
# Approx guide: ~100 steps/image for identity; 20 images → 2000 steps minimum
# For stronger identity: 3000-5000 steps; watch for overfitting at >5000

lr_scheduler = "constant"
lr_warmup_steps = 100

save_every_n_steps = 500
save_last_n_steps = 5

logging_dir = "./logs"
log_prefix = "flux_lora"
log_with = "tensorboard"

cache_latents = true
cache_latents_to_disk = false
cache_text_encoder_outputs = true
cache_text_encoder_outputs_to_disk = false

# Flux-specific: train both transformer blocks and single blocks
train_blocks = "all"  # "all" | "single" | "double"

seed = 42

[network_arguments]
network_module = "networks.lora_flux"
network_dim = 32
network_alpha = 16
# Note: alpha = dim/2 is a stable default; alpha = dim for stronger effect

# Optional: target specific layers only (faster training, less VRAM)
# network_args = ["train_t5xxl=False", "train_clip_l=True"]

[dataset_arguments]
train_data_dir = "./dataset"
resolution = "1024,1024"
enable_bucket = true
bucket_no_upscale = true
bucket_reso_steps = 64
min_bucket_reso = 512
max_bucket_reso = 2048

# Dataset folder structure:
# dataset/
#   20_zkw woman/          ← repeat count _ trigger_word class
#     img_001.png
#     img_001.txt          ← caption: "zkw woman, [description]"
#     img_002.png
#     img_002.txt
#     ...
# Minimum: 15-20 images; ideal: 30-50 images
# Variety: front + 3/4 + profile + expressions + full body + torso + closeup

[sample_prompts]
# Generates sample images every N steps to monitor training progress
sample_every_n_steps = 500
sample_sampler = "euler"
sample_prompts = [
    "zkw woman, portrait, studio lighting, sharp focus",
    "zkw woman, 3/4 view, casual outfit, natural lighting",
    "zkw woman, full body, white background"
]

# =============================================================================
# VRAM requirements:
#   network_dim=32, batch=1, grad_accum=4, bf16, cache latents:
#   ~18-22GB VRAM (RTX 3090/4090 viable)
#   For 16GB (RTX 4080): reduce train_batch_size=1, increase grad_accum=8
#   For 12GB: enable --lowram, reduce resolution to 768
# =============================================================================

# =============================================================================
# Training command (musubi-tuner / kohya):
#
# python flux_train_network.py \
#   --config_file="./kohya_config_example.toml" \
#   --dataset_config="./dataset_config.toml"
#
# Or with Kohya SS GUI: load this file in the Training tab
# =============================================================================

# =============================================================================
# Alternative: AI-Toolkit (ostris) — simpler, fewer options
# config.yaml:
#   model: black-forest-labs/FLUX.1-dev
#   network: {type: lora, linear: 32, linear_alpha: 16}
#   train: {steps: 3000, lr: 4e-4, optimizer: adamw8bit}
# =============================================================================

# =============================================================================
# Alternative: OneTrainer — recommended for character LoRAs (less overfitting)
# Export as safetensors, load in ComfyUI with LoraLoader node
# =============================================================================
